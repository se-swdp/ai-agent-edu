<title>AI, 어디까지 왔고 어디로 가는가 — 노트 덱 · 2026. 7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;width:100%;height:100%}
body{font-family:'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#fcf8f2;color:#1c1c1c;-webkit-font-smoothing:antialiased}
.slides{position:relative;width:100%;height:100%}
/* stacked slides toggled by display — a translateX film strip of N viewport-size
   images creates a huge composited layer that breaks screenshot pipelines */
.slide{position:absolute;inset:0;display:none;justify-content:center;align-items:center;background:#fcf8f2;padding:2.6vh 3vw}
.slide.active{display:flex}
/* never upscale past native 1672x941 — keeps strokes crisp on 1080p fullscreen */
.slide img{width:auto;height:auto;max-width:min(100%,1672px);max-height:min(100%,941px);object-fit:contain;display:block}
.nav{position:fixed;bottom:24px;left:36px;display:flex;gap:6px;z-index:100}
.nav button{width:36px;height:36px;background:rgba(255,255,255,0.75);border:1px solid rgba(28,28,28,0.22);color:rgba(28,28,28,0.65);font-size:14px;cursor:pointer;border-radius:50%;transition:all 0.18s;box-shadow:0 4px 12px rgba(60,50,30,0.10)}
.nav button:hover{background:#fff;color:#1c1c1c;border-color:rgba(28,28,28,0.45)}
.nav button:focus-visible{outline:2px solid #2f73bd;outline-offset:2px}
.page-num{position:fixed;bottom:30px;right:36px;font-size:0.82rem;color:rgba(28,28,28,0.55);letter-spacing:0.06em;font-family:'Noto Sans KR',sans-serif;z-index:100}
.progress{position:fixed;top:0;left:0;height:2px;background:#2f73bd;z-index:200}
@media(max-width:768px){.nav{left:16px;bottom:16px}.page-num{right:16px;bottom:22px}}
@media print{
  html,body{overflow:visible!important;height:auto}
  .nav,.progress,.page-num{display:none!important}
  .slides{display:block!important}
  .slide{display:flex!important;position:relative;page-break-after:always;break-after:page;height:100vh}
}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="slides" id="slides">
<div class="slide"><img src="note/01-cover.webp" alt="커버 — 어디까지 왔고, 어디로 가는가" fetchpriority="high" /></div>

<nav aria-label="슬라이드 이동" class="nav"><button aria-label="이전 슬라이드" onclick="prev()">&larr;</button><button aria-label="다음 슬라이드" onclick="next()">&rarr;</button></nav>
<div class="page-num" id="pageNum" aria-live="polite" aria-atomic="true">1 / 1</div>
<script>
const slides=document.querySelectorAll('.slide'),total=slides.length;
let current=0;
const pageNumEl=document.getElementById('pageNum'),progressEl=document.getElementById('progress');
slides.forEach((slide,index)=>{slide.setAttribute('role','group');slide.setAttribute('aria-roledescription','슬라이드');slide.setAttribute('aria-label',`${index+1} / ${total}`);});
function update(){slides.forEach((s,i)=>{const active=i===current;s.classList.toggle('active',active);s.setAttribute('aria-hidden',String(!active));});if(!pageNumEl||!progressEl)return;pageNumEl.textContent=`${current+1} / ${total}`;progressEl.style.width=total>1?`${(current/(total-1))*100}%`:'100%';
  [current+1,current+2,current-1].forEach(i=>{if(i>=0&&i<total){const img=slides[i].querySelector('img');if(img&&img.loading==='lazy'){img.loading='eager';}}});
}
function goTo(i){if(total===0)return;if(i<0)i=0;if(i>=total)i=total-1;current=i;try{history.replaceState(null,'','#'+(current+1));}catch(e){}update();}
function next(){goTo(current+1);}
function prev(){goTo(current-1);}
document.addEventListener('keydown',e=>{const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||document.activeElement.isContentEditable)return;switch(e.key){case'ArrowRight':case' ':case'PageDown':e.preventDefault();next();break;case'ArrowLeft':case'PageUp':e.preventDefault();prev();break;case'Home':e.preventDefault();goTo(0);break;case'End':e.preventDefault();goTo(total-1);break;case'f':case'F':const el=document.documentElement;const isFs=document.fullscreenElement||document.webkitFullscreenElement;if(!isFs){(el.requestFullscreen||el.webkitRequestFullscreen).call(el)?.catch(()=>{});}else{(document.exitFullscreen||document.webkitExitFullscreen).call(document)?.catch(()=>{});}break;}});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{if(e.touches.length>1)return;tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{if(e.changedTouches.length>1)return;const dx=tx-e.changedTouches[0].clientX,dy=ty-e.changedTouches[0].clientY;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx>0)next();else prev();}},{passive:true});
const initSlide=parseInt(location.hash.slice(1))-1;
if(!isNaN(initSlide)&&initSlide>=0)goTo(initSlide);else update();
</script>
